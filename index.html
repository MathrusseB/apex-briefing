<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFP • APEX Briefing | World Cup 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap');
        
        :root {
            --navy: #0a1428;
            --gold: #d4af37;
            --red: #c8102e;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            color: white;
            font-family: 'Barlow', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1920px;
            max-height: 1080px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
        }
        
        #bg-video {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.65;
            filter: brightness(0.85) contrast(1.1);
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(10,20,40,0.7) 100%);
            z-index: 2;
        }
        
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 3;
        }
        
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        
        .content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(1060px, 85vw);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        
        .card {
            background: rgba(10,20,40,0.85);
            border: 2px solid var(--gold);
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(212,175,55,0.3);
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .card.active { opacity: 1; }
        
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            color: var(--gold);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        p {
            font-size: 1.35rem;
            line-height: 1.5;
            max-width: 820px;
            margin: 0 auto;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 4px;
            background: linear-gradient(to right, var(--red), var(--gold));
            z-index: 20;
            transition: width 0.1s linear;
        }
        
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,20,40,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            transition: opacity 1s ease;
        }
        
        #start-btn {
            padding: 18px 60px;
            font-size: 1.8rem;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 3px;
            transition: all 0.3s;
        }
        
        #start-btn:hover {
            background: var(--gold);
            color: #000;
            transform: scale(1.05);
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="bg-video" muted loop playsinline></video>
        <div class="overlay"></div>
        <div class="scanline"></div>
        
        <!-- Start Screen -->
        <div id="start-screen">
            <div class="logo">TASK FORCE PROTECTION</div>
            <h1 style="color:#fff; font-size:2.8rem; margin-bottom:20px;">APEX DRONE TECHNOLOGY</h1>
            <p style="font-size:1.4rem; max-width:600px; margin-bottom:50px;">Power & Light District • 2026 FIFA World Cup</p>
            <button id="start-btn">CLICK TO BEGIN BRIEFING</button>
        </div>
        
        <!-- Main Content -->
        <div class="content">
            <div id="card" class="card">
                <h1 id="headline"></h1>
                <p id="body"></p>
            </div>
        </div>
        
        <div class="progress-bar" id="progress"></div>
    </div>

    <audio id="music" src="./assets/audio/music.mp3"></audio>

    <script>
        const video = document.getElementById('bg-video');
        const music = document.getElementById('music');
        const startScreen = document.getElementById('start-screen');
        const headlineEl = document.getElementById('headline');
        const bodyEl = document.getElementById('body');
        const progressBar = document.getElementById('progress');
        
        const DURATION = 65;
        
        const scenes = [
            { start: 0,   end: 6,  file: "./assets/video/scene1-intro.mp4",      headline: "APEX at the World Cup", 
              body: "Task Force Protection secures Kansas City's Power & Light District with advanced Apex drone technology for the 2026 FIFA World Cup." },
            { start: 6,   end: 13, file: "./assets/video/scene2-challenge.mp4",   headline: "The Challenge", 
              body: "Large-scale events create dynamic, high-density environments that demand real-time situational awareness beyond traditional methods." },
            { start: 13,  end: 20, file: "./assets/video/scene3-solution.mp4",    headline: "Our Solution", 
              body: "Apex delivers a mobile, rapidly deployable command platform integrated with intelligent drone networks for comprehensive coverage." },
            { start: 20,  end: 28, file: "./assets/video/scene4-drone.mp4",       headline: "Real-Time Drone Network", 
              body: "Autonomous Apex drones provide persistent aerial oversight with precision gimbal imaging and seamless live feeds." },
            { start: 28,  end: 35, file: "./assets/video/scene5-command.mp4",     headline: "Centralized Command", 
              body: "Unified operations center fuses drone telemetry, sensor data, and ground assets into actionable intelligence." },
            { start: 35,  end: 43, file: "./assets/video/scene6-coverage.mp4",    headline: "Intelligent Coverage", 
              body: "Multi-layered sensing delivers clear visibility across crowded urban zones, day or night." },
            { start: 43,  end: 50, file: "./assets/video/scene7-detection.mp4",   headline: "Advanced Detection", 
              body: "High-precision systems identify and track potential risks with speed and accuracy." },
            { start: 50,  end: 57, file: "./assets/video/scene8-scalable.mp4",    headline: "Scalable & Reliable", 
              body: "Proven drone fleet architecture scales effortlessly while maintaining continuous, organized patrol patterns." },
            { start: 57,  end: 65, file: "./assets/video/scene9-closing.mp4",     headline: "Securing the Future", 
              body: "Task Force Protection + Apex technology ensures safe, world-class experiences in the Power & Light District." }
        ];
        
        let currentSceneIndex = -1;
        let rafId = null;
        
        function loadVideo(src) {
            video.src = src;
            video.load();
            video.play().catch(e => console.log("Video play error:", e));
        }
        
        function updateScene(time) {
            for (let i = 0; i < scenes.length; i++) {
                if (time >= scenes[i].start && time < scenes[i].end) {
                    if (i !== currentSceneIndex) {
                        currentSceneIndex = i;
                        loadVideo(scenes[i].file);
                        headlineEl.textContent = scenes[i].headline;
                        bodyEl.textContent = scenes[i].body;
                        document.getElementById('card').classList.add('active');
                    }
                    return;
                }
            }
        }
        
        function tick() {
            const currentTime = music.currentTime || 0;
            const progress = Math.min((currentTime / DURATION) * 100, 100);
            progressBar.style.width = `${progress}%`;
            
            updateScene(currentTime);
            
            if (currentTime < DURATION) {
                rafId = requestAnimationFrame(tick);
            }
        }
        
        // Start Button
        document.getElementById('start-btn').addEventListener('click', async () => {
            startScreen.style.opacity = '0';
            setTimeout(() => { startScreen.style.display = 'none'; }, 1000);
            
            // Start music and video
            try {
                await music.play();
                loadVideo(scenes[0].file);
                tick();
            } catch (e) {
                console.error("Playback error:", e);
            }
        });
        
        // Keyboard support (Space to restart for testing)
        document.addEventListener('keydown', (e) => {
            if (e.key === " " && music.paused) {
                music.currentTime = 0;
                startScreen.style.display = 'flex';
                startScreen.style.opacity = '1';
            }
        });
        
        console.log("✅ TFP APEX Briefing loaded. Click 'CLICK TO BEGIN BRIEFING' to start.");
    </script>
</body>
</html>
