<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TFP Briefing • Apex Drone Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040a12;
      --navy: #07111f;
      --gold: #c9a84c;
      --white: #f4f6f8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    body {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--white);
      background: radial-gradient(circle at 50% 30%, rgba(201,168,76,.07), transparent 35%), linear-gradient(180deg, #07111f 0%, #040a12 55%, #000 100%);
    }
    .chrome, .scanlines, .vignette, .hud { position: fixed; inset: 0; pointer-events: none; }
    .scanlines { background: repeating-linear-gradient(180deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 4px); mix-blend-mode: soft-light; opacity: .35; z-index: 40; }
    .vignette { background: radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.48) 100%); z-index: 41; }
    .chrome { z-index: 39; background-image: linear-gradient(90deg, transparent 24px, rgba(255,255,255,.05) 24px, rgba(255,255,255,.05) 25px, transparent 25px), linear-gradient(transparent calc(100% - 24px), rgba(255,255,255,.05) calc(100% - 24px), rgba(255,255,255,.05) calc(100% - 23px), transparent calc(100% - 23px)); opacity: .3; }
    .hud { z-index: 42; }
    .hud:before, .hud:after { content: ''; position: absolute; top: 22px; width: 130px; height: 130px; border-top: 1px solid rgba(201,168,76,.65); opacity: .8; }
    .hud:before { left: 22px; border-left: 1px solid rgba(201,168,76,.65); }
    .hud:after { right: 22px; border-right: 1px solid rgba(201,168,76,.65); }

    .utility { position: fixed; left: 30px; right: 30px; top: 22px; z-index: 50; display: flex; justify-content: space-between; align-items: center; letter-spacing: .25em; font-size: 12px; text-transform: uppercase; color: rgba(255,255,255,.72); }
    .utility .left, .utility .right { display: flex; gap: 14px; align-items: center; }
    .utility .tag { color: var(--gold); }
    .utility .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 10px var(--gold); }

    .progress-wrap { position: fixed; left: 30px; right: 30px; bottom: 28px; z-index: 50; display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
    .progress-track { height: 4px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.08); overflow: hidden; position: relative; }
    .progress-bar { position: absolute; inset: 0 auto 0 0; width: 0%; background: linear-gradient(90deg, rgba(201,168,76,.65), var(--gold)); box-shadow: 0 0 18px rgba(201,168,76,.35); }
    .time-readout { font-size: 12px; letter-spacing: .22em; color: rgba(255,255,255,.72); min-width: 82px; text-align: right; }

    #start { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; background: radial-gradient(circle at center, rgba(201,168,76,.08), transparent 35%), linear-gradient(180deg, rgba(2,6,12,.98), rgba(0,0,0,.98)); transition: opacity .7s ease, visibility .7s ease; }
    #start.hidden { opacity: 0; visibility: hidden; }
    .start-panel { width: min(92vw, 760px); border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018)); box-shadow: 0 20px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06); padding: 42px 34px; text-align: center; position: relative; overflow: hidden; }
    .start-panel:before { content: ''; position: absolute; inset: 0; background: linear-gradient(120deg, transparent 0%, rgba(201,168,76,.09) 50%, transparent 100%); transform: translateX(-100%); animation: sheen 3.8s linear infinite; }
    @keyframes sheen { to { transform: translateX(100%); } }
    .start-logo { width: min(220px, 45vw); filter: drop-shadow(0 8px 18px rgba(0,0,0,.45)); }
    .eyebrow { margin-top: 18px; color: var(--gold); letter-spacing: .35em; font-size: 13px; text-transform: uppercase; }
    .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(46px, 8vw, 92px); line-height: .95; letter-spacing: .06em; margin: 10px 0 6px; }
    .subtitle { margin: 0 auto; max-width: 620px; font-size: clamp(17px, 2vw, 22px); line-height: 1.35; color: rgba(255,255,255,.8); }
    .start-actions { margin-top: 28px; display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .play-btn { appearance: none; border: 1px solid rgba(201,168,76,.8); background: rgba(201,168,76,.08); color: var(--gold); padding: 14px 28px; font: 600 16px/1 'Barlow Condensed', sans-serif; letter-spacing: .28em; text-transform: uppercase; cursor: pointer; transition: transform .2s ease, box-shadow .2s ease, background .2s ease; box-shadow: 0 0 0 rgba(201,168,76,0); animation: pulse 2s ease-in-out infinite; }
    .play-btn:hover { transform: translateY(-1px); background: rgba(201,168,76,.14); }
    @keyframes pulse { 50% { box-shadow: 0 0 24px rgba(201,168,76,.22); } }

    #presentation { position: fixed; inset: 0; }
    .scene { position: absolute; inset: 0; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .42s ease, visibility .42s ease, transform .42s ease; transform: scale(1.02); }
    .scene.active { opacity: 1; visibility: visible; transform: scale(1); }
    .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: .35; filter: saturate(.85) contrast(1.05) brightness(.78); transform: scale(1.06); } /* Increased opacity for better visibility */
    .scene.active .bg { animation: drift 5.5s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: scale(1.04) translateY(0px); } to { transform: scale(1.08) translateY(-10px); } }

    .scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.38) 22%, rgba(0,0,0,.48) 100%), linear-gradient(90deg, rgba(3,13,26,.65), rgba(3,13,26,.18) 42%, rgba(3,13,26,.72)); }

    .content { 
      position: relative; z-index: 2; 
      width: min(1080px, calc(100vw - 160px)); /* Tighter centering */
      height: 100%; 
      margin: 0 auto; 
      display: grid; 
      align-items: center; 
      padding: 80px 40px; 
    }

    .center-stack { text-align: center; justify-items: center; }
    .line { width: 110px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 14px auto 18px; transform: scaleX(.3); opacity: 0; transition: .7s ease; }
    .active .line { transform: scaleX(1); opacity: 1; }
    .logo-mark { width: min(200px, 35vw); opacity: 0; transform: translateY(18px) scale(.96); transition: .7s ease; }
    .active .logo-mark { opacity: 1; transform: translateY(0) scale(1); }
    .headline { font-family: 'Bebas Neue', sans-serif; text-transform: uppercase; font-size: clamp(48px, 7.5vw, 82px); line-height: .95; letter-spacing: .05em; margin: 0; opacity: 0; transform: translateY(20px); transition: .7s ease .12s; text-shadow: 0 8px 40px rgba(0,0,0,.35); }
    .active .headline { opacity: 1; transform: translateY(0); }
    .kicker { color: var(--gold); text-transform: uppercase; letter-spacing: .32em; font-size: 13px; margin-bottom: 10px; opacity: 0; transform: translateY(16px); transition: .7s ease; }
    .active .kicker { opacity: 1; transform: translateY(0); }
    .deck-copy { max-width: 720px; margin: 0 auto; font-size: clamp(18px, 2.1vw, 23px); line-height: 1.4; color: rgba(255,255,255,.85); opacity: 0; transform: translateY(18px); transition: .7s ease .18s; }
    .active .deck-copy { opacity: 1; transform: translateY(0); }

    .cap-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 60px; align-items: center; }
    .cap-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(72px, 14vw, 160px); line-height: .8; color: rgba(201,168,76,.18); position: absolute; top: 85px; left: 60px; pointer-events: none; z-index: 1; }
    .cap-title { font-family: 'Bebas Neue', sans-serif; text-transform: uppercase; letter-spacing: .05em; font-size: clamp(42px, 5.8vw, 72px); line-height: .92; margin: 0; opacity: 0; transform: translateY(24px); transition: .7s ease .08s; }
    .scene.active .cap-title { opacity: 1; transform: translateY(0); }
    .cap-desc { font-size: clamp(18px, 2.1vw, 24px); color: rgba(255,255,255,.86); max-width: 620px; margin-top: 18px; opacity: 0; transform: translateY(24px); transition: .7s ease .18s; }
    .scene.active .cap-desc { opacity: 1; transform: translateY(0); }
    .cap-panel { justify-self: end; width: min(380px, 38vw); padding: 24px; border: 1px solid rgba(255,255,255,.11); background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)); box-shadow: 0 20px 60px rgba(0,0,0,.35); opacity: 0; transform: translateX(26px); transition: .8s ease .2s; }
    .scene.active .cap-panel { opacity: 1; transform: translateX(0); }
    .cap-panel .meta { display: flex; justify-content: space-between; font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.72); }
    .cap-panel .meta span:last-child { color: var(--gold); }
    .cap-panel .bar { height: 2px; background: linear-gradient(90deg, var(--gold), transparent); margin: 16px 0 18px; }
    .cap-panel ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
    .cap-panel li { font-size: 17.5px; color: rgba(255,255,255,.86); display: flex; gap: 10px; align-items: start; }
    .cap-panel li::before { content: '▸'; color: var(--gold); }

    .proof-shell { width: min(1080px, calc(100vw - 160px)); margin: 0 auto; display: grid; grid-template-columns: minmax(0, .95fr) minmax(0, 1.05fr); gap: 50px; align-items: center; }
    .proof-left .headline { text-align: left; }
    .proof-left .line { margin-left: 0; }
    .proof-left .deck-copy { margin-left: 0; }
    .proof-card { border: 1px solid rgba(255,255,255,.11); background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015)); box-shadow: 0 18px 50px rgba(0,0,0,.35); padding: 28px 26px; display: grid; gap: 18px; opacity: 0; transform: translateY(24px); transition: .8s ease .18s; }
    .scene.active .proof-card { opacity: 1; transform: translateY(0); }

    .apex-layout { display: grid; grid-template-columns: minmax(300px, .7fr) minmax(380px, 1.3fr); gap: 50px; align-items: center; }
    .apex-tile { width: min(280px, 32vw); opacity: 0; transform: translateY(20px) scale(.96); transition: .8s ease .18s; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }
    .scene.active .apex-tile { opacity: 1; transform: translateY(0) scale(1); }
    .apex-box { position: relative; min-height: 440px; display: grid; place-items: center; }
    .apex-box img.connex { width: min(780px, 58vw); max-height: 58vh; object-fit: contain; opacity: 0; transform: translateY(24px) scale(.985); transition: 1s ease .12s; filter: drop-shadow(0 28px 60px rgba(0,0,0,.48)); position: relative; z-index: 2; }
    .scene.active .apex-box img.connex { opacity: 1; transform: translateY(0) scale(1); }
    .ring { position: absolute; width: min(680px, 56vw); aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(201,168,76,.22); box-shadow: inset 0 0 40px rgba(201,168,76,.05); animation: rotate 16s linear infinite; }
    .ring.r2 { width: min(800px, 66vw); animation-direction: reverse; animation-duration: 22s; opacity: .55; }
    .ring.r3 { width: min(540px, 44vw); border-style: dashed; animation-duration: 12s; opacity: .45; }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .apex-copy { position: absolute; left: 40px; bottom: 34px; z-index: 3; display: grid; gap: 9px; width: min(400px, 40vw); padding: 20px 20px 18px; background: linear-gradient(180deg, rgba(3,13,26,.78), rgba(3,13,26,.52)); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 18px 50px rgba(0,0,0,.3); opacity: 0; transform: translateY(18px); transition: .8s ease .4s; }
    .scene.active .apex-copy { opacity: 1; transform: translateY(0); }
    .apex-copy .hdr { font-size: 12px; letter-spacing: .28em; color: var(--gold); text-transform: uppercase; }
    .apex-copy strong { font-family: 'Bebas Neue', sans-serif; font-size: clamp(26px, 3.4vw, 44px); letter-spacing: .04em; line-height: .95; }
    .feature-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 16px; margin-top: 12px; }
    .feature { padding-top: 12px; border-top: 1px solid rgba(255,255,255,.08); font-size: 16px; line-height: 1.3; color: rgba(255,255,255,.88); opacity: 0; transform: translateY(12px); }
    .scene.active .feature { animation: featureIn .6s ease forwards; }
    .scene.active .feature:nth-child(1) { animation-delay: .55s; }
    .scene.active .feature:nth-child(2) { animation-delay: .72s; }
    .scene.active .feature:nth-child(3) { animation-delay: .89s; }
    .scene.active .feature:nth-child(4) { animation-delay: 1.06s; }
    .scene.active .feature:nth-child(5) { animation-delay: 1.23s; }
    .scene.active .feature:nth-child(6) { animation-delay: 1.40s; }
    @keyframes featureIn { to { opacity: 1; transform: translateY(0); } }

    .closing { text-align: center; display: grid; justify-items: center; gap: 10px; }
    .closing .contact { font-size: clamp(21px, 2.3vw, 29px); letter-spacing: .08em; color: rgba(255,255,255,.85); opacity: 0; transform: translateY(20px); transition: .7s ease .24s; }
    .scene.active .closing .contact { opacity: 1; transform: translateY(0); }
    .closing .url { color: var(--gold); }

    @media (max-width: 980px) {
      .content { width: calc(100vw - 80px); padding: 60px 30px; }
      .cap-grid, .proof-shell, .apex-layout { grid-template-columns: 1fr; }
      .cap-panel { justify-self: start; width: 100%; }
      .apex-copy { position: static; width: 100%; margin-top: 20px; }
    }
  </style>
</head>
<body>
  <!-- Chrome, scanlines, vignette, hud, utility, progress, start screen - identical structure -->

  <div class="chrome"></div>
  <div class="scanlines"></div>

        <button class="play-btn" id="playBtn">▶ Click to Begin</button>
        <div class="f11-note">F11 for Fullscreen</div>
      </div>
    </div>
  </div>

  <audio id="music" preload="auto" src="./assets/audio/music.mp3"></audio>

  <main id="presentation">
    <!-- Scenes with tighter content and higher video visibility -->
    <!-- Intro, 6 capability scenes using act3-v1 to act3-v6, proof, apex, close - all tightened -->

    <!-- (Full scene structure from previous version with tightened .content width and higher .bg opacity) -->

  </main>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="time-readout" id="timeReadout">00:00 / 01:05</div>
  </div>

  <script>
    // Same timeline script as before, with scenes mapped to your act3-v* videos

  </script>
</body>
</html>
